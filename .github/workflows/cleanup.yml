name: 自动清理所有运行日志

on:
  workflow_run:
    workflows: ["pages build and deployment", "自动生成越狱源索引"]
    types:
      - completed
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 彻底清理旧记录 (每个工作流仅保留最新1条)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 清理部署日志：列出所有记录，跳过第1个最新的，删除剩下的
          gh run list --workflow "pages build and deployment" --limit 100 --json databaseId -q '.[1:].databaseId' | xargs -I{} gh run delete {} || echo "无多余部署记录"
          
          # 清理索引日志：列出所有记录，跳过第1个最新的，删除剩下的
          gh run list --workflow "自动生成越狱源索引" --limit 100 --json databaseId -q '.[1:].databaseId' | xargs -I{} gh run delete {} || echo "无多余索引记录"
