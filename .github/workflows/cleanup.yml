name: 自动清理所有运行日志

on:
  workflow_dispatch: # 支持手动点击运行
  workflow_run:
    workflows: ["*"] # 只要有任务完成就触发
    types: [completed]

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 精准清理三类任务记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. 清理：自动生成越狱源索引
          echo "清理索引记录..."
          gh run list --workflow "自动生成越狱源索引" --limit 100 --json databaseId -q '.[1:].databaseId' | xargs -I{} gh run delete {} || true
          
          # 2. 清理：自动清理所有运行日志
          echo "清理自身记录..."
          gh run list --workflow "自动清理所有运行日志" --limit 100 --json databaseId -q '.[1:].databaseId' | xargs -I{} gh run delete {} || true
          
          # 3. 清理：GitHub Pages 部署记录 (这是最难删的)
          echo "清理部署记录..."
          gh run list --workflow "pages-build-deployment" --limit 100 --json databaseId -q '.[1:].databaseId' | xargs -I{} gh run delete {} || true
          
          echo "✅ 清理指令已全部发出！"
