name: 自动清理运行日志

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 强制清理冗余记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. 获取所有工作流的 ID 列表
          workflow_ids=$(gh api repos/${{ github.repository }}/workflows --jq '.workflows[].id')
          
          # 2. 额外手动加入系统内置的 Pages 任务名称，确保它也能被清理
          all_targets="$workflow_ids pages-build-deployment"
          
          for wf in $all_targets; do
            echo "--- 正在扫描任务: $wf ---"
            
            # 获取该任务下所有记录 ID，排除掉当前正在运行的清理任务，并跳过最新的那一条
            # awk 'NR>1' 的作用是：保留第1行（最新的一条），从第2行开始处理
            run_ids=$(gh run list --workflow "$wf" --limit 100 --json databaseId -q ".[] | select(.databaseId != ${{ github.run_id }}) | .databaseId" | awk 'NR>1')
            
            if [ -z "$run_ids" ]; then
              echo "该任务没有多余的旧记录需要清理。"
            else
              for rid in $run_ids; do
                if [ -n "$rid" ]; then
                  echo "正在清理 ID: $rid"
                  gh run delete "$rid" || true
                fi
              done
            fi
          done
          echo "✅ 清理完成！你的 Actions 页面现在应该非常干净了。"
