name: 自动清理所有运行日志

on:
  workflow_dispatch: # 支持手动点击运行
  workflow_run:
    workflows: ["*"] # 只要有任何任务完成，就触发清理
    types: [completed]

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write # 显式声明需要写入权限
    steps:
      - name: 强制清理所有旧记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 获取所有工作流的路径（例如 main.yml, cleanup.yml 等）
          workflows=$(gh api repos/${{ github.repository }}/workflows --jq '.workflows[].path | split("/") | last')
          
          for wf in $workflows; do
            echo "正在清理工作流: $wf"
            # 找到该工作流下除最新 1 条外的所有 ID 并删除
            # 注意：这里去掉了 || true，失败会报错，方便我们排查
            gh run list --workflow "$wf" --limit 100 --json databaseId -q '.[1:].databaseId' | xargs -I{} gh run delete {}
          done
          
          # 专门针对系统自带的部署任务进行清理
          echo "正在清理系统部署任务..."
          gh run list --workflow "pages-build-deployment" --limit 100 --json databaseId -q '.[1:].databaseId' | xargs -I{} gh run delete {}
