name: 自动清理运行日志

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 纯ID清理 (不使用名称)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "开始执行纯 ID 扫描..."
          
          # 直接获取所有运行记录，按任务 ID 分组，每组保留最新 1 条，提取其余所有 ID
          # 这样可以绕过名称识别不了导致的 404 错误
          run_ids=$(gh api repos/${{ github.repository }}/actions/runs --paginate \
            --jq '.workflow_runs | group_by(.workflow_id) | .[] | sort_by(.created_at) | reverse | .[1:] | .[].id')

          if [ -z "$run_ids" ]; then
            echo "✅ 扫描完毕：没有发现多余的旧记录。"
          else
            for rid in $run_ids; do
              # 排除当前正在运行的任务 ID，防止报错
              if [ "$rid" != "${{ github.run_id }}" ]; then
                echo "正在删除旧记录 ID: $rid"
                gh api -X DELETE repos/${{ github.repository }}/actions/runs/$rid || true
              fi
            done
            echo "🎉 清理完成！你的 Actions 列表已变干净。"
          fi
