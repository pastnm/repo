name: 自动清理运行日志

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 强制清理：每项仅保留 1 条记录
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "正在扫描所有任务记录..."
          
          # 这行指令会做四件事：
          # 1. 获取最近 500 条记录的 ID 和所属任务名称
          # 2. 按照任务名称（索引、部署、清理）进行分组
          # 3. 在每一组内，保留第 1 条（最新的），提取剩下所有旧记录的 ID
          # 4. 排除掉当前正在运行的这个清理任务 ID，防止“自杀”报错
          targets=$(gh run list --limit 500 --json databaseId,workflowName \
            -q "group_by(.workflowName) | .[] | .[1:] | .[].databaseId | select(. != ${{ github.run_id }})")

          if [ -z "$targets" ]; then
            echo "✅ 检查完毕：每个任务都只剩下一条记录，无需清理。"
          else
            for rid in $targets; do
              echo "正在清理旧记录 ID: $rid"
              gh run delete "$rid" || true
            done
            echo "🎉 清理完成！你的 Actions 列表现在应该只有 3 条绿勾了。"
          fi
