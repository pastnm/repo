name: 自动生成越狱源索引

# 当 debs 文件夹中有新的 .deb 文件变动时触发
on:
  push:
    paths:
      - 'debs/**.deb'
  workflow_dispatch: # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 安装打包依赖环境
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev bzip2 xz-utils zstd

      - name: 生成 Packages 和压缩包
        run: |
          # 扫描 debs 目录生成基础 Packages 文件
          dpkg-scanpackages -m ./debs /dev/null > Packages
          
          # 生成不同格式的压缩包 (兼容各种越狱包管理器)
          bzip2 -c9 Packages > Packages.bz2
          xz -c9 Packages > Packages.xz
          zstd -c19 Packages > Packages.zst

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add Packages Packages.bz2 Packages.xz Packages.zst
          
          # 检查是否有文件更新，如果有则提交并推送
          if git diff --staged --quiet; then
            echo "没有需要更新的索引文件。"
          else
            git commit -m "🤖 自动更新源索引文件 [skip ci]"
            git push
          fi
